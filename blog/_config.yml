title: "Shar rGya mTsho"
author: "Hwigkim"
description: "Tibetology & Sinology"
url: ""

# Jekyll Markdown Configuration
markdown: Pandoc
pandoc:
  extensions: [
    "--lua-filter=pandoc-filters/pandoc-sidenote.lua"
  ]

# Jekyll Plugins
plugins:
  - jekyll-pandoc

# Exclusion list
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
