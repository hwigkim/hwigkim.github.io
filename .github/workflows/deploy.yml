name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: blog

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install "setuptools<82.0.0"
          pip install pyewts --no-build-isolation

      - name: Diagnostic Python Check
        run: |
          python -c "import pyewts; converter = pyewts.pyewts(); val = converter.toUnicode('bod'); print('val:', repr(val), 'bytes:', val.encode('utf-8'))" > blog/diag.txt

      - name: Diagnostic Plugin Python Check
        run: |
          python -c "import sys, re, pyewts; converter = pyewts.pyewts(); text = 'This is a test of Tibetan Wylie:\n1. tibwc*bod*\n2. tibwc*bkra shis bde legs*\n3. tibwc*bKa\' \'gyur*\n'; result = re.sub(r'tibwc\*(.*?)\*', lambda m: f'{converter.toUnicode(m.group(1))} *{m.group(1)}*', text); print('result repr:', repr(result)); print('result bytes:', result.encode(\"utf-8\"))" > blog/diag_plugin.txt



      - name: Build with Jekyll
        working-directory: blog
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
